<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; display: grid; grid-template-columns: 350px 1fr; height: 100vh; }
        .panel { padding: 20px; background: #fff; overflow-y: auto; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; }
        #map { height: 100%; }
        .res { margin-top: 20px; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
<div class="panel">
    <h2>Штурман</h2>
    <select id="cfg"><option>без поддува</option><option>с поддувом</option></select>
    <input type="number" id="pass" value="2">
    <input type="range" id="temp" min="-30" max="5" value="-5">
    <input type="range" id="oil" min="0" max="100" value="90">
    <select id="mode"><option>быстрый</option><option>экономичный</option><option>кратчайший</option><option>безопасный</option></select>
    <button onclick="calc()">Рассчитать</button>
    <div id="res" class="res" style="display:none;"></div>
</div>
<div id="map"></div>
<script>
    const map = L.map('map').setView([55.85, 92.15], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let mk1, mk2, route;
    map.on('click', e => {
        if (!mk1) mk1 = L.marker(e.latlng).addTo(map);
        else if (!mk2) mk2 = L.marker(e.latlng).addTo(map);
        else { mk1.setLatLng(e.latlng); map.removeLayer(mk2); mk2 = null; }
    });
    async function calc() {
        const res = await fetch('/calculate-route', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                s_lat: mk1.getLatLng().lat, s_lon: mk1.getLatLng().lng,
                e_lat: mk2.getLatLng().lat, e_lon: mk2.getLatLng().lng,
                config: document.getElementById('cfg').value,
                mode: document.getElementById('mode').value,
                passengers: parseInt(document.getElementById('pass').value),
                temp: parseFloat(document.getElementById('temp').value),
                oil: parseFloat(document.getElementById('oil').value)
            })
        });
        const data = await res.json();
        if (route) map.removeLayer(route);
        if (data.error) document.getElementById('res').innerText = data.error;
        else {
            route = L.polyline(data.coords, {color: 'red'}).addTo(map);
            document.getElementById('res').innerHTML = `Км: ${data.km}<br>Время: ${data.time_h}<br>Топливо: ${data.fuel_l}`;
        }
    }
</script>
</body>
</html>
