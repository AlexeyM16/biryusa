<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Штурман Енисея - Raptor 650</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Настройки маршрута</h2>

        <div class="control-group">
            <label>Откуда:</label>
            <select id="start-point">
                <option value="" selected>Укажите на карте...</option>
                <option value="55.9584,92.3558">Дивногорск</option>
                <option value="55.9100,92.2500">Полынья</option>
                <option value="55.9300,92.1500">Лёд-1</option>
                <option value="55.8500,92.2800">Камни</option>
                <option value="55.8800,92.1000">Болото</option>
                <option value="55.8200,92.0500">Узел-М</option>
                <option value="55.7800,92.1200">Шуга</option>
                <option value="55.7900,91.9500">Чисто</option>
                <option value="55.7500,91.9000">Бирюса</option>
            </select>
        </div>

        <div class="control-group">
            <label>Куда:</label>
            <select id="end-point">
                <option value="" selected>Укажите на карте...</option>
                <option value="55.9584,92.3558">Дивногорск</option>
                <option value="55.9100,92.2500">Полынья</option>
                <option value="55.9300,92.1500">Лёд-1</option>
                <option value="55.8500,92.2800">Камни</option>
                <option value="55.8800,92.1000">Болото</option>
                <option value="55.8200,92.0500">Узел-М</option>
                <option value="55.7800,92.1200">Шуга</option>
                <option value="55.7900,91.9500">Чисто</option>
                <option value="55.7500,91.9000">Бирюса</option>
            </select>
        </div>

        <div class="control-group">
            <label>Конфигурация лодки:</label>
            <select id="boat-config">
                <option value="без поддува">Без поддува</option>
                <option value="с поддувом">С поддувом (чешуя)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Режим движения:</label>
            <select id="boat-mode">
                <option value="быстрый">Быстрый</option>
                <option value="экономичный">Экономичный</option>
                <option value="кратчайший">Кратчайший</option>
                <option value="безопасный">Безопасный</option>
            </select>
        </div>

        <div class="control-row">
            <div class="control-group half">
                <label>Пассажиры:</label>
                <input type="number" id="passengers" value="2" min="0" max="6">
            </div>
            <div class="control-group half">
                <label>Температура (°C):</label>
                <input type="number" id="temperature" value="-15">
            </div>
        </div>

        <div class="control-group">
            <label>Масло двигателя (%):</label>
            <input type="number" id="oil-level" value="100" min="0" max="100">
        </div>

        <button id="calc-btn" class="primary-btn">Построить маршрут</button>
        <button id="test-btn" class="secondary-btn">Тестирование мат. модели</button>

        <div id="results" class="results-panel" style="display: none;">
            <h3>Сводка</h3>
            <div class="results-grid">
                <p>Дистанция: <span id="res-km">-</span> км</p>
                <p>Время: <span id="res-time">-</span> ч</p>
                <p>Топливо: <span id="res-fuel">-</span> л</p>
                <p>Остаток: <span id="res-rem">-</span> л</p>
                <p>Ср. глубина: <span id="res-depth">-</span> м</p>
                <p>Масло: <span id="res-oil">-</span>%</p>
                <p>Макс. риск: <span id="res-risk">-</span> / 10</p>
            </div>
            <div id="res-warnings" class="warnings-box"></div>
        </div>
    </div>

    <div id="test-panel" class="test-runner">
        <div class="test-header">
            <h2>Отладка алгоритма</h2>
            <button id="close-test-btn" class="outline-btn">Закрыть панель</button>
        </div>

        <div id="test-table-container">
            <div id="test-content">Ожидание запуска...</div>
            <div class="download-container">
                <button id="download-btn" class="secondary-btn">Скачать answers.json</button>
            </div>
        </div>

        <div id="graph-view" class="hidden">
            <button id="back-graph-btn" class="outline-btn">Назад к таблице</button>
            <div class="canvas-wrapper">
                <canvas id="graph-canvas" width="600" height="400"></canvas>
            </div>
            <p class="graph-legend">Сплошной линией выделен оптимальный путь</p>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="/static/js/map.js"></script>
    <script src="/static/js/testsData.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
